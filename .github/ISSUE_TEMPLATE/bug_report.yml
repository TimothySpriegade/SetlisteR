name: Bug Report
description: Report a bug or unexpected behavior in SetlisteR
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a bug! Please fill out the sections below as thoroughly as possible so we can investigate and fix the issue quickly.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
      placeholder: I expected...
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: What actually happened instead?
      placeholder: Instead, what happened was...
    validations:
      required: true

  - type: textarea
    id: steps-to-reproduce
    attributes:
      label: Steps to Reproduce
      description: Provide step-by-step instructions to reproduce the bug.
      placeholder: |
        1. Run `setlister --artists "Artist Name" spotify`
        2. ...
        3. See error
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      description: Which operating system are you using?
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true

  - type: input
    id: setlister-version
    attributes:
      label: SetlisteR Version
      description: What version of SetlisteR are you running? (run `setlister --version`)
      placeholder: e.g. 0.1.0
    validations:
      required: true

  - type: dropdown
    id: streaming-service
    attributes:
      label: Streaming Service
      description: Which streaming service were you using when the bug occurred?
      options:
        - Spotify
        - YouTube Music
        - Not applicable / Both
    validations:
      required: false

  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / Logs
      description: If applicable, add screenshots or paste terminal output to help explain your problem.
      placeholder: Paste logs or drag-and-drop screenshots here...
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Add any other context about the problem here.
    validations:
      required: false
